# ============================================
# Traffic Violation Detection System
# Docker Compose — GCP Deployment
# ============================================
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. Point fgr2-backend.mooo.com A record to your GCP VM IP
#   3. docker compose up -d --build
#
# Ports exposed to the internet:
#   80  → Caddy (HTTP, auto-redirects to HTTPS)
#   443 → Caddy (HTTPS with auto Let's Encrypt cert)
#
# Internal:
#   8000 → FastAPI (only accessible via Caddy)
# ============================================

services:
  # ── FastAPI Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: violation-api
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      # Persist trained model files (so you can update without rebuild)
      - ./models:/app/models:ro
      # Persist output (annotated images, reports)
      - app-output:/app/output
      # Persist EasyOCR downloaded language models
      - easyocr-cache:/app/.easyocr
    environment:
      - PYTHONUNBUFFERED=1
      - EASYOCR_MODULE_PATH=/app/.easyocr
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    # Memory limit — keeps the container from OOM-killing the VM
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  # ── Caddy Reverse Proxy (auto TLS via Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # TLS certificates
      - caddy-config:/config   # Caddy runtime config
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-output:
    driver: local
  easyocr-cache:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  backend:
    driver: bridge
